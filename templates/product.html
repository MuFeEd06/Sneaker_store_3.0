{% extends "base.html" %}
{% block title %}Product — CALVAC{% endblock %}

{% block content %}

<!-- NAVBAR -->
<header>
    <div class="logo-container">
        <a href="/" style="text-decoration:none;">
            <h1 class="logo" style="font-size:1.3rem;">CALVAC</h1>
        </a>
        <img src="https://ik.imagekit.io/yocxectr4/logos/logo.png?tr=w-50,h-50,f-webp" alt="Sneaker Logo">
    </div>

    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <label for="menu-toggle" class="hamburger">
        <span></span><span></span><span></span>
    </label>

    <nav class="nav-menu">
        <a href="/">Home</a>
        <a href="/#collections">Collections</a>
        <a href="/#shop">Shop</a>
        <a href="/contact">Contact</a>
    </nav>

    <!-- Global Search -->
    <div class="header-search" id="header-search-wrap">
        <input type="text" class="header-search-input" id="header-search"
               placeholder="Search sneakers..."
               autocomplete="off"
               oninput="handleHeaderSearch(this.value)"
               onkeydown="if(event.key==='Enter')submitHeaderSearch()">
        <button class="header-search-btn" onclick="submitHeaderSearch()">🔍</button>
        <div class="search-dropdown" id="search-dropdown"></div>
    </div>

    <div class="floating-cart" onclick="window.location.href='/cart'" style="cursor:pointer">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<!-- PRODUCT SECTION -->
<section class="product-page">
<div class="product-container">

    <!-- PRODUCT IMAGE -->
    <div class="product-image">
        <img id="product-img" src="" alt="Sneaker">
    </div>

    <!-- PRODUCT DETAILS -->
    <div class="product-info">

        <h1 id="product-name"></h1>

        <div class="product-rating" id="product-rating">
            <div class="stars" id="rating-stars"></div>
            <span class="rating-score" id="rating-score"></span>
            <span class="rating-count" id="rating-count"></span>
        </div>

        <p class="price" id="product-price"></p>

        <p class="description">
            Premium sneaker designed for comfort and style. Perfect for streetwear lovers.
        </p>

        <!-- COLOR VARIANTS -->
        <div class="color-section" id="color-section" style="display:none;">
            <label class="color-label">
                Color — <span id="selected-color-name"></span>
            </label>
            <div class="color-swatches" id="color-swatches"></div>
        </div>

        <!-- SIZE CHIPS -->
        <div class="size-section" id="size-section">
            <div class="size-section-header">
                <label class="size-label">Select Size</label>
                <span class="size-unit-label" id="size-unit-label"></span>
            </div>
            <div class="size-chips-wrap" id="size-chips-wrap"></div>
            <input type="hidden" id="size-select" value="">
        </div>

        <!-- BUTTONS -->
        <div class="product-btn-group">
            <button onclick="addToCartWithSize()" class="buy-btn btn-cart">
                🛒 Add to Cart
            </button>
            <button onclick="buyNow()" class="buy-btn btn-buynow">
                ⚡ Buy Now
            </button>
        </div>

    </div>
</div>
</section>

<!-- YOU MAY ALSO LIKE -->
<section class="similar-section" id="similar-section" style="display:none;">
    <div class="similar-header">
        <h2 class="similar-title">You May Also Like</h2>
        <p class="similar-subtitle" id="similar-subtitle"></p>
    </div>
    <div class="product-grid similar-grid" id="similar-grid"></div>
</section>

{% endblock %}
